<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ block "title" . }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ .Site.Params.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap">
  <link rel="stylesheet" href="/css/style.css">
  {{ block "head" . }}{{ end }}
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="site-logo">{{ .Site.Title }}</a>
      <nav class="site-nav">
        <a href="https://cook.luischav.es/" target="_blank" rel="noopener">Tried & Tested</a>
        <a href="https://github.com/lucharo/recipes" target="_blank" rel="noopener">GitHub</a>
      </nav>
    </div>
  </header>
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  <footer class="site-footer">
    <p>Recipes saved from Instagram &middot; <a href="https://github.com/lucharo/recipes">Source</a></p>
  </footer>
  {{ block "scripts" . }}{{ end }}
</body>
</html>
