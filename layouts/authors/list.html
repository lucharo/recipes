{{ define "title" }}Authors | {{ .Site.Title }}{{ end }}

{{ define "main" }}
<section class="hero">
  <h1>Authors</h1>
  <p class="hero-sub">{{ len .Data.Terms }} Instagram creators whose recipes are saved here.</p>
</section>

<section class="author-grid">
  {{ range .Data.Terms.ByCount }}
  <a href="{{ .Page.RelPermalink }}" class="author-card">
    <span class="author-card-handle">@{{ .Page.Title }}</span>
    <span class="author-card-count">{{ .Count }} recipe{{ if ne .Count 1 }}s{{ end }}</span>
  </a>
  {{ end }}
</section>
{{ end }}
